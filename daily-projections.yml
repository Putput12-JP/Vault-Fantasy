# Daily projection feed for Vault · Lineup Command
# Runs build-feed.mjs every morning, commits the refreshed feed/latest.json.
# Setup: drop this file at  .github/workflows/daily-projections.yml  in your repo.

name: Lineup Command — daily projections

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC daily (~5am ET). Adjust as you like.
  workflow_dispatch: {}        # lets you run it on-demand from the Actions tab

permissions:
  contents: write              # needed to commit the refreshed feed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'   # Node 18+ for global fetch

      - name: Build projection feed
        run: node lineup_command/cron/build-feed.mjs

      - name: Commit refreshed feed
        run: |
          git config user.name  "vault-bot"
          git config user.email "bot@users.noreply.github.com"
          git add lineup_command/feed/latest.json
          if git diff --staged --quiet; then
            echo "No change in feed — nothing to commit."
          else
            git commit -m "chore: refresh projection feed [skip ci]"
            git push
          fi
